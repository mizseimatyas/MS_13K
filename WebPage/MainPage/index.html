<!doctype html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>WoltMarket</title>
</head>
<body>
    <div class="header py-2">
        <div class="container-fluid">
            <div class="d-flex justify-content-between align-items-center">
                <div class="logo">WoltMarket</div>
                <div class="search-container">
                    <input class=" search-input text-center" placeholder="Írd ide, mit keresel?">
                    <button class="icon-btn" id="search_icon">
                        <img src="search.svg" alt="Search">
                    </button>
                </div>
                <div class="desktop-menu d-flex gap-2">
                    <button class="icon-btn">
                        <img src="shopping-cart.svg" alt="Shopping Cart">
                    </button>
                    <button class="icon-btn">
                        <img src="user.svg" alt="User Profile">
                    </button>
                </div>
                <div class="hamburger" onclick="toggleMenu()">
                    <img src="menu.svg" alt="">
                </div>
            </div>
            <div id="mobileMenu" class="mobile-menu">
                <ul class="mobile-list">
                    <li>Kosár</li>
                    <li>WoltMarket profilom</li>
                </ul>
            </div>
        </div>
    </div>
    <div class="container mt-4">
        <div class="row g-3">
            <div class="col-lg-2 col-md-3 sidebar">
                <h4>Kategóriák</h4>
                <div class="list-group">
                    <button class="list-group-item list-group-item-action">Számítógépek és laptopok</button>
                    <button class="list-group-item list-group-item-action">PC alkatrészek</button>
                    <button class="list-group-item list-group-item-action">Monitorok</button>
                    <button class="list-group-item list-group-item-action">Perifériák</button>
                    <button class="list-group-item list-group-item-action">Gaming</button>
                    <button class="list-group-item list-group-item-action">Mobiltelefonok</button>
                    <button class="list-group-item list-group-item-action">Tabletek</button>
                    <button class="list-group-item list-group-item-action">Audió</button>
                    <button class="list-group-item list-group-item-action">Kamerák és fényképezőgépek</button>
                    <button class="list-group-item list-group-item-action">Hálózati eszközök</button>
                    <button class="list-group-item list-group-item-action">Adattárolás</button>
                    <button class="list-group-item list-group-item-action">Nyomtatók és szkennerek</button>
                </div>
            </div>
            <div class="col-lg-8 col-md-6 content">
                <div class="row g-3">
                    <div class="col-lg-2 col-md-3 col-sm-4 col-6 col-12"><div class="product">1</div></div>
                    <div class="col-lg-2 col-md-3 col-sm-4 col-6 col-12"><div class="product">2</div></div>
                    <div class="col-lg-2 col-md-3 col-sm-4 col-6 col-12"><div class="product">3</div></div>
                    <div class="col-lg-2 col-md-3 col-sm-4 col-6 col-12"><div class="product">4</div></div>
                    <div class="col-lg-2 col-md-3 col-sm-4 col-6 col-12"><div class="product">5</div></div>
                    <div class="col-lg-2 col-md-3 col-sm-4 col-6 col-12"><div class="product">6</div></div>

                    <div class="col-lg-2 col-md-3 col-sm-4 col-6 col-12"><div class="product">7</div></div>
                    <div class="col-lg-2 col-md-3 col-sm-4 col-6 col-12"><div class="product">8</div></div>
                    <div class="col-lg-2 col-md-3 col-sm-4 col-6 col-12"><div class="product">9</div></div>
                    <div class="col-lg-2 col-md-3 col-sm-4 col-6 col-12"><div class="product">10</div></div>
                    <div class="col-lg-2 col-md-3 col-sm-4 col-6 col-12"><div class="product">11</div></div>
                    <div class="col-lg-2 col-md-3 col-sm-4 col-6 col-12"><div class="product">12</div></div>
                </div>
            </div>
            <div class="col-lg-2 col-md-3 rightbar">
                <div class="ads">
                    <div class="ad"></div>
                    <div class="ad"></div>
                    <div class="ad"></div>
                </div>
            </div>
        </div>
    </div>
<script src="main.js"></script>
</body>
</html>
