<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
<div class="container">
    <h1>Regisztráció</h1>
    <div class="row">
        <div class="mb-3">
            <div class="input-group">
                <label for="basic-url" class="form-label">E-Mail</label>
                <div class="input-group">
                    <input type="text" class="form-control">
                </div>
            </div>
        </div>
    </div>
        <div class="row">
            <div class="mb-3">
                <div class="input-group">
                    <label for="basic-url" class="form-label">Jelszó</label>
                    <div class="input-group">
                        <input type="password" class="form-control">
                    </div>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="mb-3">
                <div class="input-group">
                    <label for="basic-url" class="form-label">Lakcím</label>
                    <div class="input-group">
                        <input type="text" class="form-control">
                    </div>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="mb-3">
                <label for="basic-url" class="form-label">Telefonszám</label>
                <div class="input-group">
                    <span class="input-group-text">+36-30</span>
                    <input type="number" class="form-control">
                </div>
            </div>
        </div>
    <div class="row">
        <div class="col md-12 lg-12">
            <button id="style" class="btn btn-primary w-100" type="submit" class="register_btn">Regisztrál</button>
        </div>
    </div>
</div>

    <script src="main.js"></script>
</body>
</html>
