<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>
  <body>
    <div class="container">
      <h1>Regisztráció</h1>
      <div class="container mt-2">
        <div class="row">
          <div class="col-md-6">
            <div class="card p-4 shadow">
              <h2>Regisztráció</h2>

              <div class="mb-3">
                <div class="input-group">
                  <label for="basic-url" class="form-label">E-mail</label>
                  <input type="email" class="form-control" />
                </div>
              </div>

              <div class="mb-3">
                <div class="input-group">
                  <label for="basic-url" class="form-label">Jelszó</label>
                  <input type="password" class="form-control" />
                </div>
              </div>

              <div class="mb-3">
                <div class="input-group">
                  <label for="basic-url" class="form-label">Lakcím</label>
                  <input type="text" class="form-control" />
                </div>
              </div>

              <div class="mb-3">
                <div class="input-group">
                  <label for="basic-url" class="form-label">Telefonszám</label>
                  <span class="input-group-text">+36-30</span>
                  <input type="number" class="form-control" />
                </div>
              </div>

              <button class="btn btn-primary w-100">Regisztrálok</button>
            </div>
          </div>

          <div class="col-md-6">
            <div class="card p-4 shadow">
              <h2>Belépés</h2>

              <div class="mb-3">
                <label class="form-label">E-mail</label>
                <input type="email" class="form-control" />
              </div>

              <div class="mb-3">
                <label class="form-label">Jelszó</label>
                <input type="password" class="form-control" />
              </div>

              <button class="btn btn-primary w-100">Belépek</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="main.js"></script>
  </body>
</html>
