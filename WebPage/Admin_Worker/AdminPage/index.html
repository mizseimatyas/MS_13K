<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Admin Interface</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <h2 class="logo">Mi a téma?</h2>
            <nav>
                <button class="nav-btn" data-view="user-panel">Felhasználók</button>
                <button class="nav-btn" data-view="item-panel">Termékek</button>
            </nav>
        </aside>

        <main class="main">
            <header class="topbar">
                <h1>Admin felület</h1>
            </header>

            <!-- FELHASZNÁLÓK PANEL (változatlan) -->
            <section id="user-panel" class="panel active">
                <h2>Felhasználókezelés</h2>

                <div class="user-layout">
                    <div class="card">
                        <h3>Regisztráció</h3>
                        <form id="register-form">
                            <label>
                                Felhasználónév
                                <input type="text" name="username" required>
                            </label>
                            <label>
                                Jelszó
                                <input type="password" name="password" required>
                            </label>
                            <label>
                                Telefonszám
                                <input type="tel" name="phone" required>
                            </label>
                            <label>
                                Beosztás
                                <select name="role" required>
                                    <option value="">Válassz...</option>
                                    <option value="admin">admin</option>
                                    <option value="dolgozó">dolgozó</option>
                                </select>
                            </label>
                            <button type="submit" class="primary-btn">Regisztrálás</button>
                        </form>
                        <div class="log" id="register-log"></div>
                    </div>

                    <div class="card">
                        <h3>Dolgozók</h3>
                        <div class="log" id="worker-query-log"></div>
                        <div id="worker-table-container"></div>
                    </div>
                </div>
            </section>

            <!-- TERMÉKEK PANEL – csak táblázat -->
            <section id="item-panel" class="panel">
                <h2>Termékek kezelése</h2>

                <div class="card">
                <h3>Keresés</h3>
                <form id="item-by-id-form" class="search-form">
                    <label>
                        Item ID
                        <input type="number" name="itemId" min="1" required>
                    </label>
                    <button type="submit" class="secondary-btn">ItemById</button>
                </form>
                <form id="item-by-name-form" class="search-form">
                    <label>
                        Név részlete
                        <input type="text" name="fragname" required>
                    </label>
                    <button type="submit" class="secondary-btn">ItemByName</button>
                </form>
            </div>
            <div class="card">
                <h3>Termékek táblázat</h3>
                <div id="items-table-container"></div>
            </div>
        </section>
        </main>
    </div>

    <!-- Dolgozó törlés megerősítő modal (változatlan) -->
    <div id="delete-modal" class="modal-overlay" style="display:none;">
        <div class="modal-box">
            <button id="modal-close-x" class="secondary-btn" style="position:absolute; top:0.5rem; right:0.7rem;">×</button>
            <p id="modal-message"></p>
            <div class="modal-buttons">
                <button id="modal-confirm" class="danger-btn">Törlés</button>
                <button id="modal-cancel" class="secondary-btn">Mégse</button>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
