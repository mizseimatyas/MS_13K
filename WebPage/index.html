<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <menu id="menu">
        <div class="row">
        <div class="col col-6">
            <div class="row">
                <div class="col">
                    <input type="text" class="register_inputs" id="rmail" placeholder="Email">
                </div>
            </div>
            <div class="row">
                <div class="col">
                    <input type="text" class="register_inputs" id="rpass" placeholder="Password">
                </div>
            </div>
            <div class="row">
                <div class="col">
                    <input type="text" class="register_inputs" id="raddress" placeholder="Address">
                </div>
            </div>
            <div class="row">
                <div class="col">
                    <input type="number" class="register_inputs" id="rphone" placeholder="Phone">
                </div>
            </div>
            <div class="row">
                <div class="col">
                    <button id="register_btn">Register</button>
                </div>
            </div>
        </div>

        <div class="col col-6">
            <div class="row">
                <div class="col">
                    <input type="text" class="login_inputs" id="lmail" placeholder="Email">
                </div>
            </div>
            <div class="row">
                <div class="col">
                    <input type="text" class="login_inputs" id="lpass" placeholder="Password">
                </div>
            </div>
        </div>
    </div>
</menu>
    <script src="main.js"></script>
</body>
</html>
